<html>
<script>

function HandleRegisterResponse(response)
{
	var text = JSON.parse(response);
//	document.getElementById("textResponse").innerHTML = response+"<p>";	
//	document.getElementById("textResponse").innerHTML = "response: "+text+"<p>";
document.getElementById("textResponse").innerHTML = text.message;
}

function SendRegisterRequest(fName,lName,email,username,password)
{
	var request = new XMLHttpRequest();
	request.open("POST","registration.php",true);
	request.setRequestHeader("Content-Type","application/x-www-form-urlencoded");
	request.onreadystatechange= function ()
	{
		
		if ((this.readyState == 4)&&(this.status == 200))
		{
			HandleRegisterResponse(this.responseText);
		}		
	}
	request.send("type=register&fName="+fName+"&lName="+lName+"&email="+email+"&username="+username+"&password="+password);
}
</script>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
<link href="css/main.css" rel="stylesheet">
</head>
<h1>Registration Page</h1>
<body>
<div id="textResponse">
awaiting response
</div>
<form>
	<input type="text" id="fName" placeholder="First Name" required><br>
	<input type="text" id="lName" placeholder="Last Name" required><br>
	<input type="text" id="email" placeholder="Your Email" required><br>
	<input type="text" id="username" placeholder="New Username" required><br>
	<input type="password" id="password" placeholder"New Password" required><br>
	<button type="button" onclick="SendRegisterRequest(document.getElementById('fName').value,document.getElementById('lName').value,document.getElementById('email').value,document.getElementById('username').value,document.getElementById('password').value);">Register Now</button><br>
	<a href="index.html">Login here</a>

</form>
</body>
</html>
